name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Lint and test
        run: ./gradlew ktlintCheck detekt test lint --stacktrace

  dependency-scan:
    runs-on: ubuntu-latest
    # Blocking: fails the build on any CVE in a dependency that actually ships.
    # The scan closure is limited to the release runtime classpaths (:app and
    # :unshorten) plus :core's runtime classpath, so build/test-only tooling
    # (AGP's Unified Test Platform, ktlint's transitive netty/logback) is
    # excluded and never trips the scan.
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Resolve dependency graph
        run: |
          ./gradlew -q \
            :app:dependencies --configuration releaseRuntimeClasspath \
            :unshorten:dependencies --configuration releaseRuntimeClasspath \
            :core:dependencies --configuration runtimeClasspath \
            > deps.txt 2>&1 || true
          {
            echo '<project xmlns="http://maven.apache.org/POM/4.0.0">'
            echo '<modelVersion>4.0.0</modelVersion>'
            echo '<groupId>audit</groupId><artifactId>closure</artifactId><version>1</version>'
            echo '<dependencies>'
            sed -E 's/^[ |+\`-]*//' deps.txt \
              | grep -E '^[a-zA-Z0-9_.-]+:[a-zA-Z0-9_.-]+:' \
              | sed -E 's/ \((\*|c|n)\)$//' \
              | sed -E 's/^([^ ]+):([^ ]+):([^ ]+) -> (.+)$/\1:\2:\4/' \
              | awk -F: 'NF>=3 && $3 ~ /^[0-9]/ {print $1":"$2":"$3}' \
              | sort -u \
              | while IFS=: read -r g a v; do
                  printf '<dependency><groupId>%s</groupId><artifactId>%s</artifactId><version>%s</version></dependency>\n' "$g" "$a" "$v"
                done
            echo '</dependencies></project>'
          } > pom.xml

      - name: Scan for known vulnerabilities (OSV)
        uses: google/osv-scanner-action/osv-scanner-action@v2.3.8
        with:
          scan-args: |-
            --lockfile=pom.xml:pom.xml
