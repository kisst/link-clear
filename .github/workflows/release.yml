name: Release

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  release-apk:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Decode signing keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          if [ -z "$KEYSTORE_BASE64" ]; then
            echo "::error::KEYSTORE_BASE64 secret is not set" >&2
            exit 1
          fi
          echo "$KEYSTORE_BASE64" | base64 -d > "$RUNNER_TEMP/release.jks"

      - name: Build signed release APK
        env:
          LINKCLEAR_KEYSTORE: ${{ runner.temp }}/release.jks
          LINKCLEAR_STORE_PASSWORD: ${{ secrets.KEYSTORE_STORE_PASSWORD }}
          LINKCLEAR_KEY_ALIAS: ${{ secrets.KEYSTORE_KEY_ALIAS }}
          LINKCLEAR_KEY_PASSWORD: ${{ secrets.KEYSTORE_KEY_PASSWORD }}
        run: ./gradlew :app:assembleRelease --stacktrace

      - name: Remove decoded keystore
        if: always()
        run: rm -f "$RUNNER_TEMP/release.jks"

      - name: Upload APK to the release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          apk=$(find app/build/outputs/apk/release -name '*.apk' | head -1)
          if [ -z "$apk" ]; then
            echo "::error::No release APK produced" >&2
            exit 1
          fi
          out="link-clear-${GITHUB_REF_NAME}.apk"
          cp "$apk" "$out"
          gh release upload "$GITHUB_REF_NAME" "$out" --clobber
